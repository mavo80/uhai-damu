<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Uhai Damu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, #c41e3a, #8b0000);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .login-header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .login-body {
            padding: 40px;
        }

        .user-type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: #f5f5f5;
            padding: 5px;
            border-radius: 10px;
        }

        .user-type-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #666;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .user-type-btn.active {
            background: #c41e3a;
            color: white;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #c41e3a;
            box-shadow: 0 0 0 3px rgba(196,30,58,0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #c41e3a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #8b0000;
            transform: translateY(-2px);
        }

        .signup-link {
            text-align: center;
            margin-top: 25px;
            color: #666;
            font-size: 14px;
        }

        .signup-link a {
            color: #c41e3a;
            text-decoration: none;
            font-weight: 600;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #c62828;
            font-size: 14px;
        }

        .info-text {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
            text-align: center;
            color: #666;
            font-size: 13px;
        }

        .info-text p {
            margin: 5px 0;
        }

        @media (max-width: 480px) {
            .login-body {
                padding: 25px;
            }
            .user-type-selector {
                flex-wrap: wrap;
            }
            .user-type-btn {
                padding: 8px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>
                <span>🩸</span>
                Uhai Damu
            </h1>
            <p>Kenya Blood Donation Network</p>
        </div>
        <div class="login-body">
            <div id="errorMessage" class="error-message"></div>

            <div class="user-type-selector">
                <button class="user-type-btn active" data-type="donor">
                    <span>🩸</span> Donor
                </button>
                <button class="user-type-btn" data-type="admin">
                    <span>👑</span> Admin
                </button>
                <button class="user-type-btn" data-type="hospital">
                    <span>🏥</span> Hospital
                </button>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label id="emailLabel">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email address" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
            </form>

            <div class="signup-link">
                <p>Don't have an account? <a href="register.html">Register as Donor</a></p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let selectedUserType = 'donor';

        // User type selection
        document.querySelectorAll('.user-type-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.user-type-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedUserType = btn.dataset.type;
                
                const emailLabel = document.getElementById('emailLabel');
                const emailInput = document.getElementById('email');
                
                if (selectedUserType === 'donor') {
                    emailLabel.innerHTML = 'Email Address';
                    emailInput.placeholder = 'Enter your email address';
                } else if (selectedUserType === 'admin') {
                    emailLabel.innerHTML = 'Admin Email';
                    emailInput.placeholder = 'admin@uhai-damu.co.ke';
                } else if (selectedUserType === 'hospital') {
                    emailLabel.innerHTML = 'Hospital Email';
                    emailInput.placeholder = 'hospital@knh.co.ke';
                }
            });
        });

        // Handle login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMessage');
            
            if (!email || !password) {
                errorDiv.textContent = 'Please enter both email and password';
                errorDiv.style.display = 'block';
                setTimeout(() => errorDiv.style.display = 'none', 3000);
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '⏳ Logging in...';
            
            try {
                if (selectedUserType === 'donor') {
                    const response = await fetch(`${API_BASE}/donor/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        sessionStorage.setItem('donorLoggedIn', 'true');
                        sessionStorage.setItem('donorData', JSON.stringify(data.donor));
                        sessionStorage.setItem('donorId', data.donor.id);
                        sessionStorage.setItem('userType', 'donor');
                        
                        errorDiv.style.backgroundColor = '#e8f5e9';
                        errorDiv.style.color = '#2e7d32';
                        errorDiv.style.borderLeftColor = '#4caf50';
                        errorDiv.textContent = '✅ Login successful! Redirecting to dashboard...';
                        errorDiv.style.display = 'block';
                        
                        setTimeout(() => {
                            window.location.href = 'donor-dashboard.html';
                        }, 1500);
                    } else {
                        throw new Error(data.error || 'Invalid credentials');
                    }
                } 
                else if (selectedUserType === 'admin') {
                    const response = await fetch(`${API_BASE}/admin/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        sessionStorage.setItem('adminLoggedIn', 'true');
                        sessionStorage.setItem('adminName', data.admin.full_name);
                        sessionStorage.setItem('adminRole', data.admin.role);
                        sessionStorage.setItem('userType', 'admin');
                        
                        errorDiv.style.backgroundColor = '#e8f5e9';
                        errorDiv.style.color = '#2e7d32';
                        errorDiv.style.borderLeftColor = '#4caf50';
                        errorDiv.textContent = '✅ Login successful! Redirecting to admin dashboard...';
                        errorDiv.style.display = 'block';
                        
                        setTimeout(() => {
                            window.location.href = 'admin-dashboard.html';
                        }, 1500);
                    } else {
                        throw new Error(data.error || 'Invalid credentials');
                    }
                } 
                else if (selectedUserType === 'hospital') {
                    const response = await fetch(`${API_BASE}/hospital/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        sessionStorage.setItem('hospitalLoggedIn', 'true');
                        sessionStorage.setItem('hospitalName', data.hospital.name);
                        sessionStorage.setItem('hospitalId', data.hospital.id);
                        sessionStorage.setItem('userType', 'hospital');
                        
                        errorDiv.style.backgroundColor = '#e8f5e9';
                        errorDiv.style.color = '#2e7d32';
                        errorDiv.style.borderLeftColor = '#4caf50';
                        errorDiv.textContent = '✅ Login successful! Redirecting to hospital dashboard...';
                        errorDiv.style.display = 'block';
                        
                        setTimeout(() => {
                            window.location.href = 'hospital-dashboard.html';
                        }, 1500);
                    } else {
                        throw new Error(data.error || 'Invalid credentials');
                    }
                }
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
                setTimeout(() => errorDiv.style.display = 'none', 3000);
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Sign In';
            }
        });
    </script>
    <script src="js/simple-chatbot.js"></script>
</body>
</html>

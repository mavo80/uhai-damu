<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Uhai Damu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .register-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .register-header {
            background: linear-gradient(135deg, #c41e3a, #8b0000);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .register-header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .register-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .register-body {
            padding: 40px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-group label .required {
            color: #c41e3a;
            margin-left: 4px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #c41e3a;
            box-shadow: 0 0 0 3px rgba(196,30,58,0.1);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }

        .checkbox-group input {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            font-weight: normal;
            color: #666;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: #c41e3a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .btn-register:hover {
            background: #8b0000;
            transform: translateY(-2px);
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .login-link a {
            color: #c41e3a;
            text-decoration: none;
            font-weight: 600;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #c62828;
            font-size: 14px;
        }

        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #4caf50;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-group.full-width {
                grid-column: span 1;
            }
            .register-body {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h1>
                <span>🩸</span>
                Join Uhai Damu
            </h1>
            <p>Become a hero - register as a blood donor today!</p>
        </div>
        <div class="register-body">
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>

            <form id="registerForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>First Name <span class="required">*</span></label>
                        <input type="text" id="firstName" placeholder="Enter first name" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name <span class="required">*</span></label>
                        <input type="text" id="lastName" placeholder="Enter last name" required>
                    </div>
                    <div class="form-group">
                        <label>Email <span class="required">*</span></label>
                        <input type="email" id="email" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number <span class="required">*</span></label>
                        <input type="tel" id="phone" placeholder="+254712345678" required>
                    </div>
                    <div class="form-group">
                        <label>Blood Type <span class="required">*</span></label>
                        <select id="bloodType" required>
                            <option value="">Select Blood Type</option>
                            <option value="A+">A Positive (A+)</option>
                            <option value="A-">A Negative (A-)</option>
                            <option value="B+">B Positive (B+)</option>
                            <option value="B-">B Negative (B-)</option>
                            <option value="AB+">AB Positive (AB+)</option>
                            <option value="AB-">AB Negative (AB-)</option>
                            <option value="O+">O Positive (O+)</option>
                            <option value="O-">O Negative (O-)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Date of Birth <span class="required">*</span></label>
                        <input type="date" id="dob" required>
                    </div>
                    <div class="form-group">
                        <label>County <span class="required">*</span></label>
                        <select id="county" required>
                            <option value="">Select County</option>
                            <option value="Nairobi City County">Nairobi City County</option>
                            <option value="Kiambu County">Kiambu County</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Constituency <span class="required">*</span></label>
                        <select id="constituency" required>
                            <option value="">First select a county</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Weight (kg) <span class="required">*</span></label>
                        <input type="number" id="weight" placeholder="Enter weight in kg" required>
                    </div>
                    <div class="form-group">
                        <label>Height (cm) <span class="required">*</span></label>
                        <input type="number" id="height" placeholder="Enter height in cm" required>
                    </div>
                    <div class="form-group">
                        <label>Password <span class="required">*</span></label>
                        <input type="password" id="password" placeholder="Create a password" required>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password <span class="required">*</span></label>
                        <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="ageConfirm" required>
                    <label>I confirm that I am between 17 and 65 years old</label>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="termsConfirm" required>
                    <label>I agree to the <a href="privacy-policy.html">Privacy Policy</a> and Terms of Service</label>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="consentConfirm" required>
                    <label>I consent to my contact details being shared with hospitals for blood donation purposes</label>
                </div>

                <button type="submit" class="btn-register" id="registerBtn">Register as Blood Donor</button>
            </form>

            <div class="login-link">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        
        // Constituency data
        const constituencies = {
            'Nairobi City County': [
                'Dagoretti North', 'Dagoretti South', "Lang'ata", 'Kibra', 'Roysambu',
                'Kasarani', 'Ruaraka', 'Embakasi South', 'Embakasi North', 'Embakasi Central',
                'Embakasi East', 'Embakasi West', 'Makadara', 'Kamukunji', 'Starehe',
                'Mathare', 'Westlands'
            ],
            'Kiambu County': [
                'Kiambaa', 'Kikuyu', 'Limuru', 'Gatundu North', 'Gatundu South',
                'Juja', 'Thika Town', 'Ruiru', 'Githunguri', 'Kiambu',
                'Kabete', 'Lari'
            ]
        };

        // Populate constituencies based on county selection
        document.getElementById('county').addEventListener('change', function() {
            const county = this.value;
            const constituencySelect = document.getElementById('constituency');
            constituencySelect.innerHTML = '<option value="">Select Constituency</option>';
            
            if (county && constituencies[county]) {
                constituencies[county].forEach(constituency => {
                    const option = document.createElement('option');
                    option.value = constituency;
                    option.textContent = constituency;
                    constituencySelect.appendChild(option);
                });
                constituencySelect.disabled = false;
            } else {
                constituencySelect.disabled = true;
            }
        });

        // Handle form submission
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const bloodType = document.getElementById('bloodType').value;
            const dob = document.getElementById('dob').value;
            const county = document.getElementById('county').value;
            const constituency = document.getElementById('constituency').value;
            const weight = document.getElementById('weight').value;
            const height = document.getElementById('height').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            const registerBtn = document.getElementById('registerBtn');
            
            if (password !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.style.display = 'block';
                setTimeout(() => errorDiv.style.display = 'none', 3000);
                return;
            }
            
            registerBtn.disabled = true;
            registerBtn.innerHTML = '⏳ Registering...';
            
            const donorData = {
                first_name: firstName,
                last_name: lastName,
                email: email,
                phone: phone,
                blood_type: bloodType,
                date_of_birth: dob,
                county: county,
                constituency: constituency,
                weight: parseFloat(weight),
                height: parseFloat(height),
                password: password
            };
            
            try {
                const response = await fetch(`${API_BASE}/donor/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(donorData)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    successDiv.textContent = '✅ Registration successful! Redirecting to login...';
                    successDiv.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    errorDiv.textContent = data.error || 'Registration failed';
                    errorDiv.style.display = 'block';
                    setTimeout(() => errorDiv.style.display = 'none', 3000);
                    registerBtn.disabled = false;
                    registerBtn.innerHTML = 'Register as Blood Donor';
                }
            } catch (error) {
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.style.display = 'block';
                setTimeout(() => errorDiv.style.display = 'none', 3000);
                registerBtn.disabled = false;
                registerBtn.innerHTML = 'Register as Blood Donor';
            }
        });
    </script>
</body>
</html>

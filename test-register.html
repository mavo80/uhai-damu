<!DOCTYPE html>
<html>
<head>
    <title>Test Registration</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 500px; margin: 0 auto; }
        input, button { padding: 10px; margin: 5px 0; width: 100%; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h2>Test Donor Registration</h2>
    
    <form id="testForm">
        <input type="text" id="firstName" placeholder="First Name" value="Test">
        <input type="text" id="lastName" placeholder="Last Name" value="User">
        <input type="email" id="email" placeholder="Email" value="test@example.com">
        <input type="tel" id="phone" placeholder="Phone" value="0712345678">
        <select id="bloodType">
            <option value="O+">O+</option>
            <option value="A+">A+</option>
            <option value="B+">B+</option>
        </select>
        <input type="date" id="dob" value="1990-01-01">
        <select id="county">
            <option value="Nairobi City County">Nairobi</option>
            <option value="Kiambu County">Kiambu</option>
        </select>
        <input type="text" id="constituency" placeholder="Constituency" value="Westlands">
        <input type="password" id="password" placeholder="Password" value="password123">
        <input type="password" id="confirmPassword" placeholder="Confirm Password" value="password123">
        <button type="submit">Register</button>
    </form>
    
    <div id="result"></div>

    <script>
        const API_BASE = 'http://localhost:5001/api';
        
        document.getElementById('testForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                first_name: document.getElementById('firstName').value,
                last_name: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                blood_type: document.getElementById('bloodType').value,
                date_of_birth: document.getElementById('dob').value,
                county: document.getElementById('county').value,
                constituency: document.getElementById('constituency').value,
                password: document.getElementById('password').value
            };
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '⏳ Registering...';
            
            try {
                const response = await fetch(`${API_BASE}/donor/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `<span class="success">✅ ${result.message}</span>`;
                } else {
                    resultDiv.innerHTML = `<span class="error">❌ Error: ${result.error}</span>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">❌ Connection error: ${error.message}</span>`;
                console.error('Error:', error);
            }
        });
    </script>
</body>
</html>
